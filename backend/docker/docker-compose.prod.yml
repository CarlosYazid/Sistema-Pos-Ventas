services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
      args:
        PORT: 8080

    env_file:
      - ../../.env

    ports:
      - "${PORT:-8080}:8080"

    command: >
      sh -c "
      alembic -c /app/src/db/alembic.ini upgrade head &&
      gunicorn src.main:app
      -k uvicorn.workers.UvicornWorker
      -w 4
      "

    restart: unless-stopped

    depends_on:
      supertokens:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  supertokens:
    image: supertokens/supertokens-postgresql:latest

    environment:
      POSTGRESQL_CONNECTION_URI: "${SUPERTOKENS_DB_URI}"

    ports:
      - "${SUPERTOKENS_PORT:-3567}:3567"

    volumes:
      - supertokens_data_prod:/var/lib/supertokens

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3567/hello || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  supertokens_data_prod:
